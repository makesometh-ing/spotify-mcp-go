openapi: "3.0.3"
info:
  title: Spotify Web API (Test Fixture)
  version: "1.0.0"
paths:
  /v1/playlists/{playlist_id}:
    get:
      operationId: get-playlist
      summary: Get Playlist
      description: Get a playlist owned by a Spotify user.
      tags:
        - Playlists
      parameters:
        - name: playlist_id
          in: path
          required: true
          schema:
            type: string
          description: The Spotify ID of the playlist.
        - name: market
          in: query
          required: false
          schema:
            type: string
          description: An ISO 3166-1 alpha-2 country code.
        - name: fields
          in: query
          required: false
          schema:
            type: string
          description: Filters for the query.
      security:
        - oauth_2_0:
            - playlist-read-private
      responses:
        "200":
          description: A playlist
  /v1/playlists/{playlist_id}/tracks:
    post:
      operationId: add-tracks-to-playlist
      summary: Add Items to Playlist
      description: Add one or more items to a user's playlist.
      tags:
        - Playlists
      parameters:
        - name: playlist_id
          in: path
          required: true
          schema:
            type: string
          description: The Spotify ID of the playlist.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTracksRequest"
      security:
        - oauth_2_0:
            - playlist-modify-public
            - playlist-modify-private
      responses:
        "201":
          description: Tracks added
  /v1/me/player:
    get:
      operationId: get-playback-state
      summary: Get Playback State
      description: Get information about the user's current playback state.
      tags:
        - Players
      parameters:
        - name: market
          in: query
          required: false
          schema:
            type: string
          description: An ISO 3166-1 alpha-2 country code.
        - name: additional_types
          in: query
          required: false
          schema:
            type: string
          description: A comma-separated list of item types.
      security:
        - oauth_2_0:
            - user-read-playback-state
      responses:
        "200":
          description: Playback state
    put:
      operationId: transfer-playback
      summary: Transfer Playback
      description: Transfer playback to a new device.
      deprecated: true
      tags:
        - Players
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferPlaybackRequest"
      security:
        - oauth_2_0:
            - user-modify-playback-state
      responses:
        "204":
          description: Playback transferred
  /v1/search:
    get:
      operationId: search
      summary: Search for Item
      description: Get Spotify catalog information about items matching a keyword.
      deprecated: true
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query keywords.
        - name: type
          in: query
          required: true
          schema:
            type: string
          description: Item types to search across.
      security:
        - oauth_2_0: []
      responses:
        "200":
          description: Search results
components:
  schemas:
    AddTracksRequest:
      type: object
      properties:
        uris:
          type: array
          items:
            type: string
    TransferPlaybackRequest:
      type: object
      properties:
        device_ids:
          type: array
          items:
            type: string
  securitySchemes:
    oauth_2_0:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.spotify.com/authorize
          tokenUrl: https://accounts.spotify.com/api/token
          scopes:
            playlist-read-private: Read private playlists
            playlist-modify-public: Modify public playlists
            playlist-modify-private: Modify private playlists
            user-read-playback-state: Read playback state
            user-modify-playback-state: Modify playback state
