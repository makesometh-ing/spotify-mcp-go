name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o spotify-mcp-go-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: spotify-mcp-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: spotify-mcp-go-${{ matrix.goos }}-${{ matrix.goarch }}

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup ko
        uses: ko-build/setup-ko@v0.9

      - name: Build and push container
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository }}
        run: ko build ./cmd/server --bare --tags ${{ github.ref_name }}

  release:
    runs-on: ubuntu-latest
    needs: [binaries, container]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
